<svg width="640" height="560" viewBox="0 0 640 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Premium shopping illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="640" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d2733"/>
      <stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
    <linearGradient id="gold" x1="180" y1="120" x2="470" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffd27a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="teal" x1="380" y1="60" x2="560" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop stop-color="#ffb02e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffb02e" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="640" height="560" rx="32" fill="url(#bg)"/>
  <circle cx="330" cy="270" r="260" fill="url(#glow)"/>

  <!-- floating teal card -->
  <g filter="url(#soft)">
    <rect x="392" y="92" width="150" height="110" rx="20" fill="url(#teal)"/>
    <rect x="412" y="120" width="74" height="10" rx="5" fill="#ffffff" opacity="0.85"/>
    <rect x="412" y="142" width="110" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
    <rect x="412" y="160" width="92" height="8" rx="4" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- shopping bag -->
  <g filter="url(#soft)">
    <path d="M196 250 h208 a16 16 0 0 1 15.9 14.3 l24 220 a24 24 0 0 1 -23.9 26.7 H180 a24 24 0 0 1 -23.9 -26.7 l24 -220 A16 16 0 0 1 196 250 Z" fill="url(#gold)"/>
    <path d="M232 268 v-28 a68 68 0 0 1 136 0 v28" stroke="#0b0f14" stroke-width="16" stroke-linecap="round" fill="none" opacity="0.85"/>
    <circle cx="248" cy="316" r="9" fill="#0b0f14" opacity="0.55"/>
    <circle cx="352" cy="316" r="9" fill="#0b0f14" opacity="0.55"/>
  </g>

  <!-- sparkles -->
  <g fill="#ffd27a">
    <path d="M470 300 l8 20 20 8 -20 8 -8 20 -8 -20 -20 -8 20 -8 z"/>
    <path d="M150 150 l6 15 15 6 -15 6 -6 15 -6 -15 -15 -6 15 -6 z"/>
    <path d="M520 430 l5 12 12 5 -12 5 -5 12 -5 -12 -12 -5 12 -5 z"/>
  </g>
</svg>
